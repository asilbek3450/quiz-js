{% extends "base.html" %}

{% block title %}Kirish taqiqlangan - 403{% endblock %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center p-5 shadow-lg rounded-4" 
         style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); max-width: 600px; width: 100%;">
        
        <div class="mb-4">
            <div class="display-1 fw-bold mb-0" style="background: linear-gradient(135deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">403</div>
            <div class="h4 fw-bold text-white mb-3">Kirish taqiqlangan</div>
        </div>

        <div class="mb-5">
            <i class="fas fa-lock fa-4x mb-4" style="color: #ff416c; opacity: 0.8;"></i>
            <p class="text-muted fs-5">
                Sizda masalalarni boshqarish uchun ruxsat yo'q. Bu bo'lim faqat super-admin uchun ochiq.
            </p>
        </div>

        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-light rounded-pill px-4 py-2">
                <i class="fas fa-home me-2"></i> Bosh sahifa
            </a>
            <a href="{{ url_for('arena.index') }}" class="btn btn-primary rounded-pill px-4 py-2" style="background: linear-gradient(135deg, #58a6ff, #bc8cff); border: none;">
                <i class="fas fa-code me-2"></i> Arenaga qaytish
            </a>
        </div>
    </div>

    <!-- Background decoration -->
    <div style="position: fixed; top: 20%; left: 10%; width: 300px; height: 300px; background: rgba(88, 166, 255, 0.05); border-radius: 50%; filter: blur(80px); z-index: -1;"></div>
    <div style="position: fixed; bottom: 20%; right: 10%; width: 250px; height: 250px; background: rgba(188, 140, 255, 0.05); border-radius: 50%; filter: blur(70px); z-index: -1;"></div>
</div>
{% endblock %}
